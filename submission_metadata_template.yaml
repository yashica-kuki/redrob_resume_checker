ai_usage_summary: |
  Briefly describe how AI tools were used. Examples:
  - "Used Claude for code review and architectural discussion.
     No candidate data was fed to any LLM."
  - "Used ChatGPT to debug Python issues."

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  An engineered single-pass streaming pipeline evaluates 100K+ records under 100MB RAM. The framework processes profiles through a layered heuristic matrix:

  1. Adversarial Honeypot Defense: Applies strict mathematical reality constraints cross-referencing career lifespans against skill durations, graduation milestones, and zero-duration "expert" stuffing flags to isolate and instantly disqualify synthetic profiles.

  2. Structural & Content Cross-Verification: Instead of relying on raw user-declared skill lists, the engine scans historical employment descriptions for production-oriented action verbs (e.g., deployed, scaled). It implements a custom consistency ratio to penalize keyword stuffers lacking historical evidence.

  3. Multi-Factor Weighted Allocation: Balances candidate domain competence (45% role substance), compatibility bounds (35% target experience bands, prefix-safe title matches, location mapping), and platform availability signals (20% recruiter responsiveness, account validation, and login freshness modifiers).

  Deterministic dual-key sorting ensures schema compliance and monotonic rank scoring across the final top-100 recommendation output.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
